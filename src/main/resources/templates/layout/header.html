<header class="topbar" th:fragment="header">
    <div class="topbar-left">
        <div class="topbar-title">QUẢN LÝ CHUNG CƯ BLUEMOON</div>
        <div class="topbar-subtitle">Hệ thống quản trị dữ liệu cư dân, hộ khẩu và khoản phí</div>
    </div>

    <div class="topbar-right">
        <div class="topbar-date" id="currentDateText"></div>

        <a th:href="@{/change-password}" class="admin-pill" style="text-decoration: none;">
            <span class="admin-status"></span>
            <span>Admin</span>
        </a>

        <form th:action="@{/logout}" method="post" style="margin: 0;">
            <button type="submit" class="admin-pill" style="border: none; cursor: pointer;">
                Đăng xuất
            </button>
        </form>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const dateElement = document.getElementById("currentDateText");
            if (!dateElement) {
                return;
            }

            const now = new Date();
            dateElement.textContent = now.toLocaleDateString("vi-VN", {
                weekday: "long",
                day: "2-digit",
                month: "2-digit",
                year: "numeric"
            });
        });
    </script>
</header>
