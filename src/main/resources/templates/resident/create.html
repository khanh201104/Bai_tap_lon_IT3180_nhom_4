<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm nhân khẩu - Bluemoon</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{layout/sidebar :: sidebar}"></div>

<div class="main-content">
    <div th:replace="~{layout/header :: header}"></div>

    <main class="content">
        <h1>Thêm nhân khẩu mới</h1>

        <form th:action="@{/residents}" th:object="${resident}" method="post" class="form">
            <div class="form-group">
                <label>Họ và tên:</label>
                <input type="text" th:field="*{fullName}" required>
            </div>
            <div class="form-group">
                <label>CCCD/CMND:</label>
                <input type="text" th:field="*{citizenId}">
            </div>
            <div class="form-group">
                <label>Số điện thoại:</label>
                <input type="text" th:field="*{phoneNumber}">
            </div>
            <div class="form-group">
                <label>Giới tính:</label>
                <select th:field="*{gender}">
                    <option value="Nam">Nam</option>
                    <option value="Nữ">Nữ</option>
                    <option value="Khác">Khác</option>
                </select>
            </div>
            <div class="form-group">
                <label>Ngày sinh:</label>
                <input type="text"
                       id="dateOfBirth"
                       name="dateOfBirth"
                       placeholder="dd/MM/yyyy"
                       pattern="\d{2}/\d{2}/\d{4}"
                       title="Vui lòng nhập ngày theo định dạng dd/MM/yyyy">
            </div>
            <div class="form-group">
                <label>Trạng thái:</label>
                <select th:field="*{status}">
                    <option th:each="s : ${T(com.bluemoon.apartment.constant.ResidentStatus).values()}"
                            th:value="${s}" th:text="${s}"></option>
                </select>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Lưu</button>
                <a th:href="@{/residents}" class="btn">Hủy</a>
            </div>
        </form>
    </main>

    <div th:replace="~{layout/footer :: footer}"></div>
</div>
<script>
    const dateInput = document.getElementById("dateOfBirth");

    if (dateInput) {
        dateInput.addEventListener("input", function () {
            let value = this.value.replace(/\D/g, "");

            if (value.length > 2) {
                value = value.slice(0, 2) + "/" + value.slice(2);
            }

            if (value.length > 5) {
                value = value.slice(0, 5) + "/" + value.slice(5, 9);
            }

            this.value = value;
        });
    }
</script>
</body>
</html>
