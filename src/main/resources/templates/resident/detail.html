<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết nhân khẩu - Bluemoon</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{layout/sidebar :: sidebar}"></div>

<div class="main-content">
    <div th:replace="~{layout/header :: header}"></div>

    <main class="content">
        <h1>Chi tiết nhân khẩu</h1>

        <div class="detail-container" th:object="${resident}">
            <div class="detail-row">
                <strong>ID:</strong> <span th:text="*{id}"></span>
            </div>
            <div class="detail-row">
                <strong>Họ và tên:</strong> <span th:text="*{fullName}"></span>
            </div>
            <div class="detail-row">
                <strong>CCCD/CMND:</strong> <span th:text="*{citizenId}"></span>
            </div>
            <div class="detail-row">
                <strong>Số điện thoại:</strong> <span th:text="*{phoneNumber}"></span>
            </div>
            <div class="detail-row">
                <strong>Giới tính:</strong> <span th:text="*{gender}"></span>
            </div>
            <div class="detail-row">
                <strong>Ngày sinh:</strong> <span th:text="*{dateOfBirth}"></span>
            </div>
            <div class="detail-row">
                <strong>Trạng thái:</strong> <span th:text="*{status}"></span>
            </div>
        </div>

        <div class="form-actions">
            <a th:href="@{/residents/{id}/edit(id=${resident.id})}" class="btn btn-primary">Sửa</a>
            <a th:href="@{/residents}" class="btn">Quay lại danh sách</a>
        </div>
    </main>

    <div th:replace="~{layout/footer :: footer}"></div>
</div>

</body>
</html>
