<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách nhân khẩu - Bluemoon</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{layout/sidebar :: sidebar}"></div>

<div class="main-content">
    <div th:replace="~{layout/header :: header}"></div>

    <main class="content">
        <div class="header-actions">
            <h1>Quản lý nhân khẩu</h1>
            <a th:href="@{/residents/create}" class="btn btn-primary">Thêm nhân khẩu</a>
        </div>

        <div class="search-box">
            <form th:action="@{/residents}" method="get">
                <input type="text" name="keyword" placeholder="Tìm kiếm theo tên, CCCD..." th:value="${param.keyword}">
                <button type="submit" class="btn">Tìm kiếm</button>
            </form>
        </div>

        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Họ tên</th>
                    <th>CCCD</th>
                    <th>Số điện thoại</th>
                    <th>Ngày sinh</th>
                    <th>Trạng thái</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="resident : ${residents}">
                    <td th:text="${resident.id}"></td>
                    <td th:text="${resident.fullName}"></td>
                    <td th:text="${resident.citizenId}"></td>
                    <td th:text="${resident.phoneNumber}"></td>
                    <td th:text="${resident.dateOfBirth}"></td>
                    <td th:text="${resident.status}"></td>
                    <td>
                        <a th:href="@{/residents/{id}(id=${resident.id})}" class="btn-link">Chi tiết</a>
                        <a th:href="@{/residents/{id}/edit(id=${resident.id})}" class="btn-link">Sửa</a>
                        <form th:action="@{/residents/{id}/delete(id=${resident.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn-link text-danger" onclick="return confirm('Bạn có chắc muốn xóa?')">Xóa</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>

    <div th:replace="~{layout/footer :: footer}"></div>
</div>

</body>
</html>
