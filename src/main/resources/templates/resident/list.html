<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách nhân khẩu - Bluemoon</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{layout/sidebar :: sidebar}"></div>

<div class="main-content">
    <div th:replace="~{layout/header :: header}"></div>

    <main class="content">
        <div class="header-actions">
            <h1>Quản lý nhân khẩu</h1>

            <button type="button" class="btn btn-primary" onclick="openCreateModal()">
                Thêm nhân khẩu
            </button>
        </div>

        <div class="search-box">
            <form th:action="@{/residents}" method="get">
                <input type="text"
                       name="keyword"
                       placeholder="Tìm kiếm theo tên, CCCD..."
                       th:value="${param.keyword}">
                <button type="submit" class="btn">Tìm kiếm</button>
            </form>
        </div>

        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Họ tên</th>
                <th>CCCD</th>
                <th>Số điện thoại</th>
                <th>Ngày sinh</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="resident : ${residents}">
                <td th:text="${resident.id}"></td>
                <td th:text="${resident.fullName}"></td>
                <td th:text="${resident.citizenId}"></td>
                <td th:text="${resident.phoneNumber}"></td>
                <td th:text="${resident.dateOfBirth}"></td>
                <td th:text="${resident.status}"></td>
                <td>
                    <a th:href="@{/residents/{id}(id=${resident.id})}" class="btn-link">Chi tiết</a>
                    <a th:href="@{/residents/{id}/edit(id=${resident.id})}" class="btn-link">Sửa</a>

                    <form th:action="@{/residents/{id}/delete(id=${resident.id})}"
                          method="post"
                          style="display:inline;">
                        <button type="submit"
                                class="btn-link text-danger"
                                onclick="return confirm('Bạn có chắc muốn xóa?')">
                            Xóa
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

        <!-- MODAL THÊM NHÂN KHẨU -->
        <div id="createResidentModal" class="modal-overlay">
            <div class="modal-box">
                <div class="modal-header">
                    <h2>Thêm nhân khẩu mới</h2>
                    <button type="button" class="modal-close" onclick="closeCreateModal()">×</button>
                </div>

                <!-- Lỗi validate bằng JS -->
                <div id="clientModalError" class="modal-alert-error hidden"></div>

                <!-- Lỗi từ server: CCCD trùng -->
                <div th:if="${modalErrorMessage}" class="modal-alert-error">
                    <span th:text="${modalErrorMessage}"></span>
                </div>

                <!-- Lỗi validate từ server -->
                <div th:if="${validationErrors}" class="modal-alert-error">
                    <div th:each="err : ${validationErrors}" th:text="${err}"></div>
                </div>

                <form id="createResidentForm"
                      th:action="@{/residents}"
                      th:object="${resident}"
                      method="post"
                      onsubmit="return validateResidentForm()">

                    <div class="form-group">
                        <label>Họ và tên</label>
                        <input type="text" th:field="*{fullName}" id="fullName">
                    </div>

                    <div class="form-group">
                        <label>CCCD</label>
                        <input type="text" th:field="*{citizenId}" id="citizenId">
                    </div>

                    <div class="form-group">
                        <label>Số điện thoại</label>
                        <input type="text" th:field="*{phoneNumber}" id="phoneNumber">
                    </div>

                    <div class="form-group">
                        <label>Giới tính</label>
                        <select th:field="*{gender}" id="gender">
                            <option value="">-- Chọn giới tính --</option>
                            <option value="Nam">Nam</option>
                            <option value="Nữ">Nữ</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Ngày sinh</label>

                        <div class="date-input-wrapper">
                            <input type="text"
                                   th:field="*{dateOfBirth}"
                                   id="dateOfBirth"
                                   placeholder="dd/MM/yyyy"
                                   maxlength="10"
                                   inputmode="numeric"
                                   autocomplete="off">

                            <input type="date" id="nativeDatePicker" class="native-date-picker">

                            <button type="button"
                                    class="date-picker-btn"
                                    onclick="openNativeDatePicker()">
                                📅
                            </button>
                        </div>

                        <small class="form-hint">
                            Có thể nhập tay hoặc bấm biểu tượng lịch.
                        </small>
                    </div>

                    <div class="form-group">
                        <label>Trạng thái</label>
                        <select th:field="*{status}" id="status">
                            <option value="">-- Chọn trạng thái --</option>
                            <option value="ACTIVE">Đang cư trú</option>
                            <option value="TEMPORARY_RESIDENCE">Tạm trú</option>
                            <option value="TEMPORARY_ABSENCE">Tạm vắng</option>
                            <option value="MOVED_OUT">Đã chuyển đi</option>
                        </select>
                    </div>

                    <div class="modal-actions">
                        <button type="button" class="btn btn-outline" onclick="closeCreateModal()">Hủy</button>
                        <button type="submit" class="btn btn-primary">Lưu</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div th:replace="~{layout/footer :: footer}"></div>
</div>

<script th:inline="javascript">
    function openCreateModal() {
        document.getElementById("createResidentModal").classList.add("show");
    }

    function closeCreateModal() {
        document.getElementById("createResidentModal").classList.remove("show");
        hideClientError();
    }

    function showClientError(message) {
        const errorBox = document.getElementById("clientModalError");
        errorBox.innerText = message;
        errorBox.classList.remove("hidden");
    }

    function hideClientError() {
        const errorBox = document.getElementById("clientModalError");
        errorBox.innerText = "";
        errorBox.classList.add("hidden");
    }

    function formatDateInput(value) {
        let digits = value.replace(/\D/g, "").slice(0, 8);

        if (digits.length >= 5) {
            return digits.slice(0, 2) + "/" + digits.slice(2, 4) + "/" + digits.slice(4);
        }

        if (digits.length >= 3) {
            return digits.slice(0, 2) + "/" + digits.slice(2);
        }

        return digits;
    }

    function isValidDateString(value) {
        const regex = /^\d{2}\/\d{2}\/\d{4}$/;

        if (!regex.test(value)) {
            return false;
        }

        const parts = value.split("/");
        const day = Number(parts[0]);
        const month = Number(parts[1]);
        const year = Number(parts[2]);

        const date = new Date(year, month - 1, day);

        const isRealDate =
            date.getFullYear() === year &&
            date.getMonth() === month - 1 &&
            date.getDate() === day;

        if (!isRealDate) {
            return false;
        }

        const today = new Date();
        today.setHours(0, 0, 0, 0);

        if (date > today) {
            return false;
        }

        return true;
    }

    function ddmmyyyyToIso(value) {
        const parts = value.split("/");
        if (parts.length !== 3) return "";

        const day = parts[0];
        const month = parts[1];
        const year = parts[2];

        if (day.length !== 2 || month.length !== 2 || year.length !== 4) return "";

        return year + "-" + month + "-" + day;
    }

    function isoToDdmmyyyy(value) {
        if (!value) return "";

        const parts = value.split("-");
        if (parts.length !== 3) return "";

        return parts[2] + "/" + parts[1] + "/" + parts[0];
    }

    function openNativeDatePicker() {
        const dateInput = document.getElementById("dateOfBirth");
        const nativeDatePicker = document.getElementById("nativeDatePicker");

        const isoValue = ddmmyyyyToIso(dateInput.value);

        if (isoValue) {
            nativeDatePicker.value = isoValue;
        }

        if (nativeDatePicker.showPicker) {
            nativeDatePicker.showPicker();
        } else {
            nativeDatePicker.click();
        }
    }

    function validateResidentForm() {
        hideClientError();

        const fullName = document.getElementById("fullName").value.trim();
        const citizenId = document.getElementById("citizenId").value.trim();
        const phoneNumber = document.getElementById("phoneNumber").value.trim();
        const gender = document.getElementById("gender").value.trim();
        const dateOfBirth = document.getElementById("dateOfBirth").value.trim();
        const status = document.getElementById("status").value.trim();

        if (!fullName || !citizenId || !phoneNumber || !gender || !dateOfBirth || !status) {
            showClientError("Vui lòng nhập đầy đủ tất cả thông tin nhân khẩu.");
            return false;
        }

        if (!isValidDateString(dateOfBirth)) {
            showClientError("Ngày sinh không hợp lệ. Vui lòng nhập theo định dạng dd/MM/yyyy.");
            return false;
        }

        return true;
    }

    const dateInput = document.getElementById("dateOfBirth");
    const nativeDatePicker = document.getElementById("nativeDatePicker");

    if (dateInput) {
        dateInput.addEventListener("input", function () {
            const cursorAtEnd = this.selectionStart === this.value.length;

            this.value = formatDateInput(this.value);

            if (cursorAtEnd) {
                this.selectionStart = this.selectionEnd = this.value.length;
            }
        });
    }

    if (nativeDatePicker) {
        nativeDatePicker.addEventListener("change", function () {
            dateInput.value = isoToDdmmyyyy(this.value);
        });
    }

    const shouldOpenModal = /*[[${modalOpen != null && modalOpen}]]*/ false;

    if (shouldOpenModal) {
        openCreateModal();
    }
</script>

</body>
</html>
