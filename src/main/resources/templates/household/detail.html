<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết hộ khẩu</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          rel="stylesheet">
</head>

<body style="background:#f4f6f9">

<div class="container mt-5">

    <div class="card shadow-lg border-0">

        <div class="card-header bg-info text-white">

            <h3>
                <i class="fa-solid fa-house-user"></i>
                Chi tiết hộ khẩu
            </h3>

        </div>

        <div class="card-body">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="fw-bold">Mã hộ khẩu</label>

                    <div class="form-control bg-light">
                        HK001
                    </div>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="fw-bold">Chủ hộ</label>

                    <div class="form-control bg-light">
                        Nguyễn Văn A
                    </div>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="fw-bold">Số căn hộ</label>

                    <div class="form-control bg-light">
                        A101
                    </div>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="fw-bold">Trạng thái</label>

                    <div>
                        <span class="badge bg-success">
                            Đang hoạt động
                        </span>
                    </div>
                </div>

            </div>

            <hr>

            <h5 class="mb-3">
                Thành viên hộ khẩu
            </h5>

            <table class="table table-bordered">

                <thead class="table-primary">

                <tr>
                    <th>STT</th>
                    <th>Họ tên</th>
                    <th>Quan hệ</th>
                </tr>

                </thead>

                <tbody>

                <tr>
                    <td>1</td>
                    <td>Nguyễn Văn A</td>
                    <td>Chủ hộ</td>
                </tr>

                <tr>
                    <td>2</td>
                    <td>Nguyễn Thị B</td>
                    <td>Vợ</td>
                </tr>

                </tbody>

            </table>

            <a href="list.html"
               class="btn btn-secondary">
                Quay lại
            </a>

        </div>

    </div>

</div>

</body>
</html>
