<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thêm hộ khẩu</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-success text-white">
            <h3>Thêm hộ khẩu</h3>
        </div>

        <div class="card-body">

            <form>

                <div class="mb-3">
                    <label>Mã hộ khẩu</label>
                    <input class="form-control">
                </div>

                <div class="mb-3">
                    <label>Chủ hộ</label>
                    <input class="form-control">
                </div>

                <div class="mb-3">
                    <label>Số căn hộ</label>
                    <input class="form-control">
                </div>

                <button class="btn btn-success">
                    Lưu
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
