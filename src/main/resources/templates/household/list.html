<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý hộ khẩu</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body style="background:#f5f7fa">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

        </div>

        <div class="card-body">

            <div class="row mb-3">

                <div class="col-md-4">
                    <input type="text"

                           placeholder="Tên chủ hộ">
                </div>

                <div class="col-md-4">
                    <input type="text"
                           class="form-control"
                           placeholder="Số căn hộ">
                </div>

                <div class="col-md-2">
                    <button class="btn btn-primary">
                        Tìm kiếm
                    </button>
                </div>

                <div class="col-md-2 text-end">
                    <a href="create.html"
                       class="btn btn-success">

                    </a>
                </div>

            </div>

            <table class="table table-bordered table-hover">

                <thead class="table-primary">

                <tr>
                    <th>ID</th>
                    <th>Mã hộ khẩu</th>
                    <th>Chủ hộ</th>
                    <th>Số căn hộ</th>
                    <th>Thao tác</th>
                </tr>

                </thead>

                <tbody>

                <tr>
                    <td>1</td>
                    <td>HK001</td>
                    <td>Nguyễn Văn A</td>
                    <td>A101</td>

                    <td>

                        <a href="detail.html"
                           class="btn btn-info btn-sm">
                            Chi tiết
                        </a>

                        <a href="edit.html"
                           class="btn btn-warning btn-sm">
                            Sửa
                        </a>

                        <button class="btn btn-danger btn-sm">
                            Xóa
                        </button>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
