<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đổi mật khẩu - Bluemoon</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        .password-page {
            min-height: 100vh;
            background: #f6f6f6;
        }

        .password-wrapper {
            max-width: 620px;
            margin: 0 auto;
            padding: 42px 20px;
        }

        .password-card {
            background: white;
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
            border: 1px solid #eee;
        }

        .password-card h1 {
            color: #b30000;
            margin-bottom: 8px;
        }

        .password-card p {
            color: #777;
            margin-bottom: 24px;
        }

        .password-alert-success {
            padding: 12px 14px;
            background: #e7f7ea;
            color: #137333;
            border: 1px solid #b7e1c1;
            border-radius: 10px;
            margin-bottom: 16px;
            font-weight: 700;
        }

        .password-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 22px;
        }

        .field-error {
            display: block;
            margin-top: 6px;
            color: #b30000;
            font-size: 13px;
            font-weight: 600;
        }

        .input-error {
            border-color: #b30000 !important;
            background: #fff7f7;
        }
    </style>
</head>

<body>
<div th:replace="~{layout/sidebar :: sidebar}"></div>

<div class="main-content">
    <div th:replace="~{layout/header :: header}"></div>

    <main class="content">
        <div class="password-wrapper">
            <div class="password-card">
                <h1>Đổi mật khẩu</h1>
                <p>Cập nhật mật khẩu đăng nhập cho tài khoản hiện tại.</p>

                <div class="password-alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

                <form th:action="@{/change-password}" th:object="${changePasswordRequest}" method="post">
                    <div class="form-group">
                        <label>Mật khẩu hiện tại</label>
                        <input type="password"
                               th:field="*{currentPassword}"
                               th:classappend="${#fields.hasErrors('currentPassword')} ? 'input-error' : ''"
                               placeholder="Nhập mật khẩu hiện tại">
                        <span class="field-error"
                              th:if="${#fields.hasErrors('currentPassword')}"
                              th:errors="*{currentPassword}">
                        </span>
                    </div>

                    <div class="form-group">
                        <label>Mật khẩu mới</label>
                        <input type="password"
                               th:field="*{newPassword}"
                               th:classappend="${#fields.hasErrors('newPassword')} ? 'input-error' : ''"
                               placeholder="Ít nhất 6 ký tự">
                        <span class="field-error"
                              th:if="${#fields.hasErrors('newPassword')}"
                              th:errors="*{newPassword}">
                        </span>
                    </div>

                    <div class="form-group">
                        <label>Xác nhận mật khẩu mới</label>
                        <input type="password"
                               th:field="*{confirmPassword}"
                               th:classappend="${#fields.hasErrors('confirmPassword')} ? 'input-error' : ''"
                               placeholder="Nhập lại mật khẩu mới">
                        <span class="field-error"
                              th:if="${#fields.hasErrors('confirmPassword')}"
                              th:errors="*{confirmPassword}">
                        </span>
                    </div>

                    <div class="password-actions">
                        <a th:href="@{/dashboard}" class="btn btn-outline">Quay lại</a>
                        <button type="submit" class="btn btn-primary">Cập nhật mật khẩu</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div th:replace="~{layout/footer :: footer}"></div>
</div>
</body>
</html>
