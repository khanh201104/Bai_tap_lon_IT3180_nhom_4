<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - Bluemoon</title>

    <style>
        body {
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
            background:
                    linear-gradient(135deg, rgba(80, 0, 0, 0.72), rgba(18, 0, 0, 0.62)),
                    url("/images/login/login-bg.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .login-bg-overlay {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                    radial-gradient(circle at 15% 10%, rgba(179, 0, 0, 0.46), transparent 34%),
                    radial-gradient(circle at 85% 85%, rgba(255, 255, 255, 0.13), transparent 30%),
                    linear-gradient(90deg, rgba(80, 0, 0, 0.58), rgba(255, 255, 255, 0.08));
            pointer-events: none;
        }

        .login-page {
            position: relative;
            z-index: 2;
            width: 100%;
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1.05fr 0.95fr;
        }

        .login-left {
            color: white;
            padding: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .login-left::before {
            content: "";
            position: absolute;
            width: 340px;
            height: 340px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            top: -120px;
            left: -100px;
        }

        .login-left::after {
            content: "";
            position: absolute;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            bottom: -80px;
            right: 40px;
        }

        .login-brand {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 36px;
        }

        .login-logo {
            width: 52px;
            height: 52px;
            border-radius: 17px;
            background: white;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.26);
        }

        .login-brand-text strong {
            display: block;
            color: #ffffff;
            font-size: 25px;
            line-height: 1.1;
            text-shadow: 0 4px 18px rgba(0, 0, 0, 0.28);
        }

        .login-brand-text span {
            display: block;
            margin-top: 5px;
            color: #ffe0e0;
            font-size: 13px;
            text-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
        }

        .login-title {
            position: relative;
            z-index: 1;
            max-width: 650px;
            padding: 26px 28px;
            border-radius: 26px;
            background: rgba(100, 0, 0, 0.28);
            border: 1px solid rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(4px);
            box-shadow: 0 22px 48px rgba(0, 0, 0, 0.18);
        }

        .login-title h1 {
            color: white;
            font-size: 46px;
            line-height: 1.16;
            margin: 0 0 18px;
            text-shadow: 0 6px 22px rgba(0, 0, 0, 0.34);
        }

        .login-title p {
            color: #ffe0e0;
            font-size: 16px;
            line-height: 1.7;
            margin: 0;
            text-shadow: 0 4px 14px rgba(0, 0, 0, 0.28);
        }

        .login-right {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 42px;
        }

        .login-card {
            width: 100%;
            max-width: 430px;
            padding: 42px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(14px);
            box-shadow: 0 28px 70px rgba(0, 0, 0, 0.28);
        }

        .login-card-header {
            margin-bottom: 26px;
        }

        .login-card-header h2 {
            color: #b30000;
            font-size: 32px;
            margin: 0 0 8px;
        }

        .login-card-header p {
            color: #777;
            margin: 0;
            font-size: 14px;
            line-height: 1.6;
        }

        .login-note {
            margin-bottom: 18px;
            padding: 13px 14px;
            border-radius: 12px;
            background: #fff7f7;
            border: 1px solid #ffd2d2;
            color: #8f0000;
            font-size: 13px;
            line-height: 1.55;
        }

        .login-form-group {
            margin-bottom: 18px;
        }

        .login-form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 700;
            font-size: 14px;
        }

        .login-form-group input {
            width: 100%;
            box-sizing: border-box;
            padding: 13px 14px;
            border: 1px solid #ddd;
            border-radius: 12px;
            outline: none;
            font-size: 15px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            background: rgba(255, 255, 255, 0.92);
        }

        .login-form-group input:focus {
            border-color: #b30000;
            box-shadow: 0 0 0 4px rgba(179, 0, 0, 0.08);
            background: #ffffff;
        }

        .login-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin: 4px 0 24px;
            color: #666;
            font-size: 14px;
        }

        .login-options label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .login-options input {
            accent-color: #b30000;
        }

        .login-options a {
            color: #b30000;
            text-decoration: none;
            font-weight: 700;
        }

        .login-options a:hover {
            text-decoration: underline;
        }

        .login-submit {
            width: 100%;
            border: none;
            border-radius: 999px;
            padding: 14px 18px;
            background: linear-gradient(135deg, #c40000, #8f0000);
            color: white;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 14px 30px rgba(179, 0, 0, 0.28);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .login-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 36px rgba(179, 0, 0, 0.36);
        }

        @media (max-width: 1000px) {
            body {
                overflow-y: auto;
            }

            .login-page {
                grid-template-columns: 1fr;
            }

            .login-left {
                padding: 44px 28px 20px;
            }

            .login-title {
                max-width: none;
            }

            .login-title h1 {
                font-size: 34px;
            }

            .login-right {
                padding: 24px 24px 42px;
            }

            .login-card {
                max-width: 520px;
            }
        }

        @media (max-width: 560px) {
            .login-left {
                padding: 30px 18px 14px;
            }

            .login-brand {
                margin-bottom: 22px;
            }

            .login-title {
                padding: 20px;
                border-radius: 20px;
            }

            .login-title h1 {
                font-size: 28px;
            }

            .login-right {
                padding: 18px;
            }

            .login-card {
                padding: 28px 22px;
                border-radius: 22px;
            }

            .login-options {
                align-items: flex-start;
                flex-direction: column;
            }
        }
    </style>
    ```

</head>

<body>
<div class="login-bg-overlay"></div>

<div class="login-page">
    <section class="login-left">
        <div class="login-brand">
            <div class="login-logo"></div>


            <div class="login-brand-text">
                <strong>Bluemoon</strong>
                <span>Apartment Management</span>
            </div>
        </div>

        <div class="login-title">
            <h1>Quản lý chung cư</h1>
            <p>
                IT3180 - Nhóm 4
            </p>
        </div>
        <div class="login-illustration">
            <img th:src="@{/images/login/login-building.svg}"
                 src="/images/login/login-building.svg"
                 alt="Bluemoon Apartment">
        </div>
    </section>

    <section class="login-right">
        <div class="login-card">
            <div class="login-card-header">
                <h2>Đăng nhập</h2>
                <p>Nhập thông tin để truy cập hệ thống quản lý chung cư Bluemoon.</p>
            </div>

            <div class="login-note" th:if="${param.error}">
                Tên đăng nhập hoặc mật khẩu không đúng.
            </div>

            <div class="login-note" th:if="${param.logout}">
                Đăng xuất thành công.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="login-form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input id="username"
                           name="username"
                           type="text"
                           placeholder="Ví dụ: admin"
                           autocomplete="username">
                </div>

                <div class="login-form-group">
                    <label for="password">Mật khẩu</label>
                    <input id="password"
                           name="password"
                           type="password"
                           placeholder="Nhập mật khẩu"
                           autocomplete="current-password">
                </div>

                <div class="login-options">
                    <label>
                        <input type="checkbox" name="remember">
                        Ghi nhớ đăng nhập
                    </label>

                    <a href="javascript:void(0)">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="login-submit">
                    Đăng nhập
                </button>
            </form>
        </div>
    </section>
    ```

</div>
</body>
</html>
