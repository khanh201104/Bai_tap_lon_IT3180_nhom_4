<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý loại phí</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{layout/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{layout/header :: header}"></div>
    <main class="content">
        <h1>Quản lý loại phí</h1>
        <p th:if="${message}" th:text="${message}" style="color:green;margin-bottom:12px;"></p>
        <div style="display:flex;gap:12px;align-items:center;margin:16px 0;">
            <a class="btn btn-primary" th:href="@{/fees/create}">+ Thêm loại phí</a>
            <form th:action="@{/fees}" method="get" style="display:flex;gap:8px;">
                <input type="text" name="q" th:value="${q}" placeholder="Tìm tên phí..." style="padding:8px;">
                <button class="btn btn-outline" type="submit">Tìm</button>
            </form>
            <a class="btn btn-outline" th:href="@{/fee-payments}">Đóng phí</a>
            <a class="btn btn-outline" th:href="@{/living-fees}">Phí sinh hoạt</a>
        </div>
        <table class="table">
            <thead>
            <tr>
                <th>ID</th><th>Tên</th><th>Số tiền</th><th>Cách tính</th><th>Tần suất</th><th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="f : ${fees}">
                <td th:text="${f.id}"></td>
                <td th:text="${f.name}"></td>
                <td th:text="${#numbers.formatDecimal(f.amount,0,'COMMA',0,'POINT')}"></td>
                <td th:text="${f.chargeType}"></td>
                <td th:text="${f.frequency}"></td>
                <td>
                    <a th:href="@{/fees/{id}/edit(id=${f.id})}">Sửa</a>
                    <form th:action="@{/fees/{id}/delete(id=${f.id})}" method="post" style="display:inline;">
                        <button type="submit" onclick="return confirm('Xóa?')">Xóa</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </main>
    <div th:replace="~{layout/footer :: footer}"></div>
</div>
</body>
</html>
