<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Sửa phí sinh hoạt</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<div th:replace="~{layout/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{layout/header :: header}"></div>
    <main class="content">
        <h1>Sửa phí sinh hoạt</h1>
        <form th:action="@{/living-fees/{id}/edit(id=${item.id})}" th:object="${item}" method="post" style="max-width:480px;">
            <p><label>Tên: <input th:field="*{name}" style="width:100%;padding:8px;"></label></p>
            <p><label>Loại: <select th:field="*{category}" style="width:100%;padding:8px;">
                <option value="electric">Điện</option><option value="water">Nước</option><option value="general">Khác</option>
            </select></label></p>
            <p><label>Mã hộ: <input th:field="*{householdId}" type="number" style="width:100%;padding:8px;"></label></p>
            <p><label>Căn hộ: <input th:field="*{apartmentCode}" style="width:100%;padding:8px;"></label></p>
            <p><label>Tháng: <input th:field="*{billingMonth}" style="width:100%;padding:8px;"></label></p>
            <p><label>Số tiền: <input th:field="*{amount}" type="number" style="width:100%;padding:8px;"></label></p>
            <button class="btn btn-primary" type="submit">Cập nhật</button>
            <a class="btn btn-outline" th:href="@{/living-fees}">Hủy</a>
        </form>
    </main>
    <div th:replace="~{layout/footer :: footer}"></div>
</div>
</body>
</html>
