<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật tạm trú/vắng - Bluemoon</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{layout/sidebar :: sidebar}"></div>

<div class="main-content">
    <div th:replace="~{layout/header :: header}"></div>

    <main class="content">
        <div class="header-actions">
            <h1>Cập nhật tạm trú/tạm vắng</h1>
        </div>

        <div class="form-container">
            <form th:action="@{/temporary/{id}/update(id=${id})}" th:object="${temporary}" method="post">
                <div class="form-group">
                    <label>Nhân khẩu</label>
                    <select th:field="*{residentId}" class="form-control" required>
                        <option th:each="r : ${residents}" th:value="${r.id}" th:text="${r.fullName + ' - ' + r.citizenId}"></option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Loại hình</label>
                    <select th:field="*{type}" class="form-control" required>
                        <option th:each="t : ${T(com.bluemoon.apartment.constant.TemporaryType).values()}"
                                th:value="${t}" th:text="${t}"></option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Ngày bắt đầu</label>
                    <input type="date" th:field="*{startDate}" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Ngày kết thúc</label>
                    <input type="date" th:field="*{endDate}" class="form-control">
                </div>

                <div class="form-group">
                    <label>Lý do</label>
                    <textarea th:field="*{reason}" class="form-control" rows="3"></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Cập nhật</button>
                    <a th:href="@{/temporary}" class="btn">Hủy</a>
                </div>
            </form>
        </div>
    </main>

    <div th:replace="~{layout/footer :: footer}"></div>
</div>

</body>
</html>
