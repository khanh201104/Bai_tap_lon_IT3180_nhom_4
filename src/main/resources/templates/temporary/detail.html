<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết tạm trú/vắng - Bluemoon</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{layout/sidebar :: sidebar}"></div>

<div class="main-content">
    <div th:replace="~{layout/header :: header}"></div>

    <main class="content">
        <div class="header-actions">
            <h1>Chi tiết tạm trú/tạm vắng</h1>
            <a th:href="@{/temporary}" class="btn">Quay lại</a>
        </div>

        <div class="detail-container">
            <div class="detail-row">
                <span class="label">Họ tên:</span>
                <span class="value" th:text="${temporary.resident.fullName}"></span>
            </div>
            <div class="detail-row">
                <span class="label">CCCD:</span>
                <span class="value" th:text="${temporary.resident.citizenId}"></span>
            </div>
            <div class="detail-row">
                <span class="label">Loại hình:</span>
                <span class="value" th:text="${temporary.type}"></span>
            </div>
            <div class="detail-row">
                <span class="label">Ngày bắt đầu:</span>
                <span class="value" th:text="${temporary.startDate}"></span>
            </div>
            <div class="detail-row">
                <span class="label">Ngày kết thúc:</span>
                <span class="value" th:text="${temporary.endDate}"></span>
            </div>
            <div class="detail-row">
                <span class="label">Lý do:</span>
                <span class="value" th:text="${temporary.reason}"></span>
            </div>
        </div>
    </main>

    <div th:replace="~{layout/footer :: footer}"></div>
</div>

</body>
</html>
